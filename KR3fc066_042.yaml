body:
  text: 除法凡除法皆先置實以法約之可商幾何除即定幾何為得數乃以得數之幾何乘法為所除之數此除兼乘法之説也又以所除之幾何數與原實相減此除兼減法之説也然後視餘多少幾何為第二次實再如前法除之此蓋指除得盡而言設遇有除不盡者即所謂不受除是已不受除則不除此而乘彼故借根方法有乘而無除所謂除者惟以借根除諸數降位而已今姑設數法以備例假如十二立方多九平方以三根除之問得若干答曰四平方多三根法以三根除十二立方多九平方得四平方以四平
  hash: sha256:613419ff39c0cd024e5ef70a7ed8bfb3c56cd8b98d925ea497de98aae8733028
