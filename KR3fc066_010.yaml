body:
  text: 皆進五位餘悉例推除法定位説凡除法定位與乘法定位相反乘法用進位除法用降位定位表表中右行所列者借數之名左行所列者定位之數定位者視根方所對之位也乘以所進之位與所對之位之數相加其加數所對之位卽乘出之數也除以所降之位與所對之位之數相減其減餘數所對之位卽除得之數也筭位説凡筭位皆自左而右如筭盤式蓋本泰西原法也
