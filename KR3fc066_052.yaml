body:
  text: 相等法假如有銀十兩欲分為大小二分大分比小分多四兩問大小二分各若干答曰大分七兩小分三兩法借一根為小分則大分即為一根多四兩兩數相併得二根多四兩與十兩相等乃各減四兩得二根與六兩相等二根既與六兩相等則一根必與三兩相等前既借一根為小分則三兩即小分加四兩得七兩即大分也正法以十兩減去四兩餘六兩折半為小分其法甚易故首列之俾由淺入深假如有井一口不知其深用繩一條取六分之一比井深少三尺四寸若取四分之一比井深適等問井
