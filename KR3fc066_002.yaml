body:
  text: 宣城梅文穆公悟借根方即天元一法原名東來表秦西謂之為阿爾熱八達今名乃譯書者質言之也伏讀御製數理精蘊反復探索乃知借根方者蓋假借根數方數以求所之數法根者線也面之界也借根而兼言方者根為方之邊方為根之積若根乘根則成平方根乘平方則成立方以至屢乘及多乘方俱所必用故名之曰借根方其大致與衰分之立衰相似特衰分之立衰僅御本數此法則全切算法無不可御是誠算家之極妙者也凡布算者先借一根為所求之數因之以加減乘除務令與未知之數比例齊等而所求之數乃出惟是加減乘除必須視多少之號以定同異而借數又有一定之位為進為降不容或紊未易猝曉稍一混淆毫釐千里衡少喜泰西學因梅氏第解此法與天元一名異實同究未嘗
  hash: sha256:6f97e59ff0966af3a813b4c3e9727b38057ab992f2d07511f078142de9f70958
