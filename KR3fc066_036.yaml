body:
  text: 干答曰一平方少三根多二真數法以少二真數乘少一真數得多二真數以少二真數乘一根得少二根少與多乘又以一根乘少一真數得少一根多與少乘以一根乘一根得一平方相併是為一平方少三根多二真數合問此末位少與少乘而首位恆為多故首位則多與多乘首末又多少相乘之法也詳上假如四立方少二根少一真數以二平方少二真數乘之問得若干答曰八四乘方少十二立方少二平方多四根多二真數
