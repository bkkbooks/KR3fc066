body:
  text: 減法假如四平方多五根內減二平方多二根問餘若干答曰二平方多三根法以四平方內減二平方餘二平方以五根內減二根餘三根是爲二平方多三根合問此多與多減原數大于減數減餘爲多之法也假如四平方少三根內減三平方少二根問餘若干答曰一平方少一根法以四平方內減三平方餘一平方以三根內減二根餘一根是爲一平方少一根合問
