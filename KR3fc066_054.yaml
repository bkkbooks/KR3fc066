body:
  text: 深及繩長若干答曰井深一丈零二寸繩長四丈八寸法借二十四根為繩長數兩分毋相乘數取其四分之一得六根則井深即為六根又取其六分之一得四根則井深又為四根多三尺四寸此二數為相等各減四根餘二根與三尺四寸相等二根既與三尺四寸相等則一根必與一尺七寸相等而二十四根必與四丈八寸相等即繩長也相等即用法也其用甚廣今舉二則以例餘
