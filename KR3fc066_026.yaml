body:
  text: 為多之法也假如五立方少三平方內減三立方多二平方問餘若干答曰二立方少五平方法以五立方內減三立方餘二立方以三平方減二平方應餘一平方今多少兩數不同故相加得五平方因原數為少故得數亦為少是為二立方少五平方合問此少與多減應相加而原數為少故相加亦為少之法也假如四立方多六平方內減二立方多三平方多三根問餘若干答曰二立方多三平方少三根
