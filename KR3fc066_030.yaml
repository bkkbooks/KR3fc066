body:
  text: 乘法假如三根多二眞數以三眞數乘之問得若干答曰九根多六眞數法以三眞數乘二眞數得多六眞數以三眞數乘三根得九根是爲九根多六眞數合問此多與多乘得數皆爲多之法也假如四根多二眞數以二根多三眞數乘之問得若干答曰八平方多十六根多六眞數
