body:
  text: 乘法假如三根多二真數以三真數乘之問得若干答曰九根多六真數法以三真數乘二真數得多六真數以三真數乘三根得九根是為九根多六真數合問此多與多乘得數皆為多之法也假如四根多二真數以二根多三真數乘之問得若干答曰八平方多十六根多六真數
