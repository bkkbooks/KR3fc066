body:
  text: 多二根少四眞數得四根以四根乘多二眞數得多八根以四根乘多三根得多十二平方以四根乘二平方得八立方是第一次除數共爲八立方多十二平方多八根與實相減原實多八平方今除數多十二平方原實多二根今除數多八根是原數皆小于減數乃以減數之十二平方反減原數之八平方餘四平方變爲少以減數之八根反減原數之二根餘六根亦變爲少也餘少四平方少六根少四眞數爲第二次實復以二平方多三根多二眞數除少四平方少六根少四眞數得少二眞數以少二眞數乘多二眞數得少四眞數以少二眞數乘多三根得少六根以少二眞數乘二平方得少四平方是第二次除數共爲少四平方少六根少四眞數與實相減恰盡是爲四根少二眞數合問此原實雖爲多然第二次實之首位已變多爲少矣故第二次得數亦爲少也假如九立方少十二平方少五根多六眞數以三平方少二根少三眞數除之問得若干
