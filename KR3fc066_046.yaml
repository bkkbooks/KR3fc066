body:
  text: 多二根少四真數得四根以四根乘多二真數得多八根以四根乘多三根得多十二平方以四根乘二平方得八立方是第一次除數共為八立方多十二平方多八根與實相減原實多八平方今除數多十二平方原實多二根今除數多八根是原數皆小于減數乃以減數之十二平方反減原數之八平方餘四平方變為少以減數之八根反減原數之二根餘六根亦變為少也餘少四平方少六根少四真數為第二次實復以二平方多三根多二真數除少四平方少六根少四真數得少二真數以少二真數乘多二真數得少四真數以少二真數乘多三根得少六根以少二真數乘二平方得少四平方是第二次除數共為少四平方少六根少四真數與實相減恰盡是為四根少二真數合問此原實雖為多然第二次實之首位已變多為少矣故第二次得數亦為少也假如九立方少十二平方少五根多六真數以三平方少二根少三真數除之問得若干
