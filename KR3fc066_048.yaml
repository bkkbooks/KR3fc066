body:
  text: 答曰三根少二真數法以三平方少二根少三真數除九立方少十二平方少五根多六真數得三根以三根乘少三真數得少九根以三根乘少二根得少六平方以三根乘三平方得九立方是第一次除數共為九立方少六平方少九根與實相減餘少六平方多四根多六真數為第二次實復以三平方少二根少三真數除少六平方多四根多六真數得少二真數以少二真數乘少三真數得多六真數以少二真數乘少二根得多
