body:
  text: 法以多三真數乘少四真數得少十二真數以多三真數乘二根得多六根多與多乘又以一根乘少四真數得少四根多與少乘以一根乘二根得二平方相併是為二平方多二根少十二真數合問此多與少乘得數為少之法也凡為首一位雖無多號悉作多論即如是法中多三真數乘少四真數是多與少乘故為少又多三真數乘為首之二根是多與多乘故為多又為首之一根乘少四真數是多與少乘故為少又為首之一根乘為首之二根是多與多乘故乘出為首之二平方亦作多論也假如一根少一真數以一根少二真數乘之問得若
  hash: sha256:dc866f3463d3a7fcc727e22951bf35222d3eee37df09195aaa76a053975e4242
