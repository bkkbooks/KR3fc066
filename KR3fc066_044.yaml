body:
  text: 方乘三根得十二立方與實相減恰盡餘多九平方為第二次實復以三根除多九平方得多三根以多三根乘三根得多九平方與實相減恰盡是為四平方多三根合問正法以一根為除數今變用三根者取淺顯耳假如八立方多八平方多二根少四真數以二平方多三根多二真數除之問得若干答曰四根少二真數法以二平方多三根多二真數除八立方多八平方
