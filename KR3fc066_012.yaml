body:
  text: 加法假如二平方與一平方多四根相加問該若干答曰三平方多四根法以二平方與一平方相加得三平方是為三平方多四根此單位相加之法也假如三平方多四根與二平方多三根相加問該若干答曰五平方多七根法以三平方與二平方相加得五平方以四根與三根相加得七根是為五平方多七根合問
