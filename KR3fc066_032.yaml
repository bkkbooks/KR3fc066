body:
  text: 法以多三真數乘多二真數得多六真數以多三真數乘四根得多十二根又以二根乘多二真數得多四根以二根乘四根得八平方相併是為八平方多十六根多六真數合問此亦多與多乘得數皆為多之法也凡以根乘根為平方以根乘平方為立方以根乘立方為三乘方上而至于四乘方五乘方悉皆遞升一位其故何也蓋定位表中根數之位為一故凡與所乘之位皆進一位算如根與真數乘則進一位為根根自乘則進一位為平方根與平方乘則進一位為立方根與立方乘則進一位為三乘方根與三乘方乘則進一位為四乘方是也若平方之位為二則凡與所乘之位皆進二位算如平方與平方乘則進二位為三乘方是也他若立方多乘方皆視表中之數為進位倣此假如二根少四真數以一根多三真數乘之問得若干答曰二平方多二根少十二真數
