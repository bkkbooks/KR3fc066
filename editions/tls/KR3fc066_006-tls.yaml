body:
  text: 用號説凡用號有三如丄爲多號爲少號二爲相等號辨明用號則多少之數不淆矣加法説凡法中多與多加得數仍爲多少與少加得數仍爲少若多與少加少與多加則相減多數大爲多少數大爲少減法説凡法中多與多減原數大于減數則減餘仍爲多少與少減原數大于減數則減餘仍爲少若多與多減原數小于減數則以減數反減原數而減餘卽爲少又若少與少減原數小于減數則以減數反減原數而減餘卽爲多至于多與少減少與多減則相加爲減餘數原數爲多則減餘數亦爲多原數爲少則減餘數亦爲少
