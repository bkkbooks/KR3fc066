body:
  text: 答曰三根少二眞數法以三平方少二根少三眞數除九立方少十二平方少五根多六眞數得三根以三根乘少三眞數得少九根以三根乘少二根得少六平方以三根乘三平方得九立方是第一次除數共爲九立方少六平方少九根與實相減餘少六平方多四根多六眞數爲第二次實復以三平方少二根少三眞數除少六平方多四根多六眞數得少二眞數以少二眞數乘少三眞數得多六眞數以少二眞數乘少二根得多
