body:
  text: 法以多三眞數乘多二眞數得多六眞數以多三眞數乘四根得多十二根又以二根乘多二眞數得多四根以二根乘四根得八平方相併是爲八平方多十六根多六眞數合問此亦多與多乘得數皆爲多之法也凡以根乘根爲平方以根乘平方爲立方以根乘立方爲三乘方上而至于四乘方五乘方悉皆遞升一位其故何也蓋定位表中根數之位爲一故凡與所乘之位皆進一位筭如根與眞數乘則進一位爲根根自乘則進一位爲平方根與平方乘則進一位爲立方根與立方乘則進一位爲三乘方根與三乘方乘則進一位爲四乘方是也若平方之位爲二則凡與所乘之位皆進二位筭如平方與平方乘則進二位爲三乘方是也他若立方多乘方皆視表中之數爲進位倣此假如二根少四眞數以一根多三眞數乘之問得若干答曰二平方多二根少十二眞數
