body:
  text: 假如一立方多三根與一平方少一根相加問該若干答曰一立方多一平方多二根法以一立方與一平方相加得一立方多一平方以多三根與少一根相減餘二根因多數大故爲多是爲一立方多一平方多二根合問此相加位分不同之法也凡相加兩數位分不同須各按位列號中設空補足位分始不相淆
