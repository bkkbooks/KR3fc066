body:
  text: 相等法假如有銀十兩欲分爲大小二分大分比小分多四兩問大小二分各若干答曰大分七兩小分三兩法借一根爲小分則大分卽爲一根多四兩兩數相併得二根多四兩與十兩相等乃各減四兩得二根與六兩相等二根旣與六兩相等則一根必與三兩相等前旣借一根爲小分則三兩卽小分加四兩得七兩卽大分也正法以十兩減去四兩餘六兩折半爲小分其法甚易故首列之俾由淺入深假如有井一口不知其深用繩一條取六分之一比井深少三尺四寸若取四分之一比井深適等問井
