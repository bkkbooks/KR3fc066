body:
  text: 深及繩長若干答曰井深一丈零二寸繩長四丈八寸法借二十四根爲繩長數兩分毋相乘數取其四分之一得六根則井深卽爲六根又取其六分之一得四根則井深又爲四根多三尺四寸此二數爲相等各減四根餘二根與三尺四寸相等二根旣與三尺四寸相等則一根必與一尺七寸相等而二十四根必與四丈八寸相等卽繩長也相等卽用法也其用甚廣今擧二則以例餘
