body:
  text: 法以多三眞數乘少四眞數得少十二眞數以多三眞數乘二根得多六根多與多乘又以一根乘少四眞數得少四根多與少乘以一根乘二根得二平方相併是爲二平方多二根少十二眞數合問此多與少乘得數爲少之法也凡爲首一位雖無多號悉作多論卽如是法中多三眞數乘少四眞數是多與少乘故爲少又多三眞數乘爲首之二根是多與多乘故爲多又爲首之一根乘少四眞數是多與少乘故爲少又爲首之一根乘爲首之二根是多與多乘故乘出爲首之二平方亦作多論也假如一根少一眞數以一根少二眞數乘之問得若
  hash: sha256:e92cc4779d5c6f4003e4303f285a94a7af6295b3439490d00647de9c6f4804dd
