body:
  text: 爲多之法也假如五立方少三平方內減三立方多二平方問餘若干答曰二立方少五平方法以五立方內減三立方餘二立方以三平方減二平方應餘一平方今多少兩數不同故相加得五平方因原數爲少故得數亦爲少是爲二立方少五平方合問此少與多減應相加而原數爲少故相加亦爲少之法也假如四立方多六平方內減二立方多三平方多三根問餘若干答曰二立方多三平方少三根
