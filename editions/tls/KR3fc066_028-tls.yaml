body:
  text: 法以四立方內減二立方餘二立方以六平方內減三平方多三根餘三平方少三根蓋根位旣空故平方內減多三根是爲平方內少三根若平方內減少三根則爲平方內多三根也是爲二立方多三平方少三根合問此相減位分不同之法也凡相減兩數位分不同須各按位列號中設空補足位分始不相淆
