body:
  text: 乘法説凡法中多與多乘少與少乘得數皆爲多若少與多乘多與少乘得數皆爲少除法説凡法中除兼乘減其得數之多與少皆視每次實之多少爲定乘法定位説乘法定位如眞數乘眞數則仍爲眞數乘根則仍爲根乘平方則仍爲平方此眞數乘各數也故眞數皆在本位如根乘根則爲平方乘平方則爲立方乘立方則爲三乘方此根乘各數也故根皆進一位如平方乘平方則爲三乘方乘立方則爲四乘方乘三乘方則爲五乘方此平方乘各數也故平方皆進二位如立方乘立方則爲五乘方乘三乘方則爲六乘方乘四乘方則爲七乘方此立方乘各數也故立方皆進三位等而上之三乘方皆進四位四乘方
