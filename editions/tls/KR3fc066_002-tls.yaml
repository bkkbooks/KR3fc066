body:
  text: 宣城梅文穆公悟借根方卽天元一法原名東來表秦西謂之爲阿爾熱八達今名乃譯書者質言之也伏讀御製數理精蘊反復探索乃知借根方者蓋假借根數方數以求所之數法根者線也面之界也借根而兼言方者根爲方之邊方爲根之積若根乘根則成平方根乘平方則成立方以至屢乘及多乘方俱所必用故名之曰借根方其大致與衰分之立衰相似特衰分之立衰僅御本數此法則全切筭法無不可御是誠筭家之極妙者也凡布筭者先借一根爲所求之數因之以加減乘除務令與未知之數比例齊等而所求之數乃出惟是加減乘除必須視多少之號以定同異而借數又有一定之位爲進爲降不容或紊未易猝曉稍一混淆毫釐千里衡少喜泰西學因梅氏第解此法與天元一名異實同究未嘗
  hash: sha256:52dffe728851ffe4ad3de6f0e6ab74463c4c5145beb7dfa0d4b0944bb2d9107a
