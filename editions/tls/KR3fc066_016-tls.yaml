body:
  text: 法以四平方與二平方相加得六平方以四根與三根相加應該七根今多少兩數不同故相減餘一根因多數爲四根比少數三根大故爲多是爲六平方多一根合問此多與少加多數大爲多之法也假如二平方少三根與一平方多二根相加問該若干答曰三平方少一根法以二平方與一平方相加得三平方以三根與二根相加應該五根今多少兩數不同故相減餘一根因少數爲三根比多數二根大故爲少是爲三平方少一根合問此少與多加少數大爲少之法也
