body:
  text: 法以六平方內減五平方餘一平方原三根內不能減四根乃于減數四根內反減三根餘一根卽變爲多是爲一平方多一根合問此少與少減原數小于減數反減原數而減餘變爲多之法也假如三立方多四平方內減二立方少一平方問餘若干答曰一立方多五平方法以三立方內減二立方餘一立方以四平方減一平方應餘三平方今多少兩數不同故相加得五平方因原數爲多故得數亦爲多是爲一立方多五平方合問此多與少減應相加而原數爲多故相加後亦
