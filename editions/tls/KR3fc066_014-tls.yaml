body:
  text: 此多與多加得數仍爲多之法也假如四立方少一平方與三立方少二平方相加問該若干答曰七立方少三平方法以四立方與三立方相加得七立方以一平方與二平方相加得三平方是爲七立方少三平方合問此少與少加得數仍爲少之法也假如四平方多四根與二平方少三根相加問該若干答曰六平方多一根
