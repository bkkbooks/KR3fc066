body:
  text: 此少與少減原數大于減數減餘為少之法也假如七平方多三根內減四平方多五根問餘若干答曰三平方少二根法以七平方內減四平方餘三平方原三根內不能減五根乃于減數五根內反減三根餘二根即變為少是為三平方少二根合問此多與多減原數小于減數反減原數而減餘變為少之法也假如六平方少三根內減五平方少四根問餘若干答曰一平方多一根
