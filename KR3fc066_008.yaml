body:
  text: 乘法說凡法中多與多乘少與少乘得數皆為多若少與多乘多與少乘得數皆為少除法說凡法中除兼乘減其得數之多與少皆視每次實之多少為定乘法定位說乘法定位如真數乘真數則仍為真數乘根則仍為根乘平方則仍為平方此真數乘各數也故真數皆在本位如根乘根則為平方乘平方則為立方乘立方則為三乘方此根乘各數也故根皆進一位如平方乘平方則為三乘方乘立方則為四乘方乘三乘方則為五乘方此平方乘各數也故平方皆進二位如立方乘立方則為五乘方乘三乘方則為六乘方乘四乘方則為七乘方此立方乘各數也故立方皆進三位等而上之三乘方皆進四位四乘方
