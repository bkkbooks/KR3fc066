body:
  text: 用號說凡用號有三如丄為多號為少號二為相等號辨明用號則多少之數不淆矣加法說凡法中多與多加得數仍為多少與少加得數仍為少若多與少加少與多加則相減多數大為多少數大為少減法說凡法中多與多減原數大于減數則減餘仍為多少與少減原數大于減數則減餘仍為少若多與多減原數小于減數則以減數反減原數而減餘即為少又若少與少減原數小于減數則以減數反減原數而減餘即為多至于多與少減少與多減則相加為減餘數原數為多則減餘數亦為多原數為少則減餘數亦為少
